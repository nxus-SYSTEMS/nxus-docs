  </g>

  <g filter="url(#bloom)">
    <circle cx="960" cy="540" r="130" fill="url(#coreGlow)"/>
    <circle cx="960" cy="540" r="24" fill="#ffffff" opacity="0.95"/>
  </g>

  <g opacity="0.35">
    <circle cx="180" cy="120" r="1.2" fill="#bfe7ff"/>
    <circle cx="420" cy="260" r="1.0" fill="#bfe7ff"/>
    <circle cx="1620" cy="180" r="1.1" fill="#bfe7ff"/>
    <circle cx="1480" cy="820" r="1.0" fill="#bfe7ff"/>
    <circle cx="260" cy="860" r="1.1" fill="#bfe7ff"/>
    <circle cx="980" cy="120" r="1.0" fill="#bfe7ff"/>
    <circle cx="1120" cy="980" r="1.2" fill="#bfe7ff"/>
  </g>
</svg>
