# ci.yml
#
# Validates PRs: type-checks and builds the site without deploying.
# Runs on all PRs to main and on pushes to non-main branches.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run astro check 2>/dev/null || npx tsc --noEmit

      - name: Build
        run: npm run build
